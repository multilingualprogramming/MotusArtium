name: Build and Deploy MotusArtium

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MotusArtium
        uses: actions/checkout@v4

      - name: Checkout multilingualprogramming
        uses: actions/checkout@v4
        with:
          repository: multilingualprogramming/multilingual
          path: multilingual

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install multilingualprogramming
        run: |
          cd multilingual
          pip install --upgrade pip
          pip install -e ".[wasm]"
          cd ..

      - name: Build and stage GitHub Pages artifact
        run: python scripts/build_static_site.py --multilingual-root multilingual --build-dir _build --out-dir _site

      - name: Smoke test static artifact
        run: python tests/smoke_static_site.py _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
