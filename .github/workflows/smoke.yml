name: Smoke Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MotusArtium
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke test committed static site
        run: python tests/smoke_static_site.py .

  bundle-exports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MotusArtium
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify bundle.js module exports
        run: node tests/bundle_exports.js bundle.js
