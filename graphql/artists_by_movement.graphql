query ArtistsByMovement($movementId: String!, $languageCode: LanguageCode!) {
  searchItems(
    query: {
      and: [
        { property: "P135", value: $movementId }
        { property: "P31", value: "Q5" }
      ]
    }
  ) {
    edges {
      node {
        id
        artistLabel: label(languageCode: $languageCode)
      }
    }
  }
}
