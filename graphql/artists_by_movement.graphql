query ArtistsByMovement($movementId: String!, $languageCode: LanguageCode!, $first: Int = 28, $after: String) {
  searchItems(
    query: {
      and: [
        { property: "P135", value: $movementId }
        { property: "P31", value: "Q5" }
      ]
    }
    first: $first
    after: $after
  ) {
    edges {
      node {
        id
        artistLabel: label(languageCode: $languageCode)
      }
    }
    pageInfo {
      endCursor
      hasNextPage
    }
  }
}
