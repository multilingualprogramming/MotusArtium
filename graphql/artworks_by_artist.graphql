query ArtworksByArtist($artistId: String!, $languageCode: String!) {
  searchItems(
    query: {
      and: [
        { property: "P170", value: $artistId }
        { property: "P31", value: "Q3305213" }
      ]
    }
  ) {
    edges {
      node {
        id
        artworkLabel: label(languageCode: $languageCode)
        creator: statements(propertyId: "P170") {
          value {
            ... on ItemValue {
              id
              label(languageCode: $languageCode)
            }
          }
        }
        inceptionDate: statements(propertyId: "P571") {
          value {
            ... on TimeValue { time }
          }
        }
        museum: statements(propertyId: "P195") {
          value {
            ... on ItemValue {
              id
              label(languageCode: $languageCode)
            }
          }
        }
      }
    }
  }
}
