query ArtworksByMuseum($museumId: String!, $languageCode: LanguageCode!, $first: Int = 24, $after: String) {
  searchItems(
    query: {
      property: "P195"
      value: $museumId
    }
    first: $first
    after: $after
  ) {
    edges {
      node {
        id
        artworkLabel: label(languageCode: $languageCode)
      }
    }
    pageInfo {
      endCursor
      hasNextPage
    }
  }
}
