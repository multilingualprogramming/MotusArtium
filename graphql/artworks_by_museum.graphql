query ArtworksByMuseum($museumId: String!, $languageCode: LanguageCode!) {
  searchItems(
    query: {
      and: [
        { property: "P31", value: "Q3305213" }
        { property: "P195", value: $museumId }
      ]
    }
  ) {
    edges {
      node {
        id
        artworkLabel: label(languageCode: $languageCode)
      }
    }
  }
}
