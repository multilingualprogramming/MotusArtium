query CountriesCoordinates($ids: [ItemId!]!, $languageCode: LanguageCode!) {
  itemsById(ids: $ids) {
    id
    countryLabel: label(languageCode: $languageCode)
    coordinate: statements(propertyId: "P625") {
      value {
        ... on GlobeCoordinateValue {
          latitude
          longitude
        }
      }
    }
  }
}
