<!DOCTYPE html>
<html lang="fr">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="MotusArtium - Atlas semantique interactif de l'evolution de l'art">
        <title>MotusArtium</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: "Segoe UI", sans-serif;
                color: #1f2933;
                background:
                    radial-gradient(circle at top left, rgba(244, 162, 97, 0.25), transparent 30%),
                    radial-gradient(circle at top right, rgba(42, 157, 143, 0.2), transparent 28%),
                    linear-gradient(180deg, #f8f4ec 0%, #eef4fb 100%);
                min-height: 100vh;
            }

            .shell {
                max-width: 1200px;
                margin: 0 auto;
                padding: 24px;
            }

            .hero {
                background: rgba(255, 255, 255, 0.82);
                -webkit-backdrop-filter: blur(6px);
                backdrop-filter: blur(6px);
                border: 1px solid rgba(31, 41, 51, 0.08);
                border-radius: 24px;
                padding: 24px;
                box-shadow: 0 20px 60px rgba(31, 41, 51, 0.08);
            }

            h1 {
                margin: 0 0 8px;
                font-size: clamp(2rem, 4vw, 3.4rem);
            }

            .subtitle {
                margin: 0;
                color: rgba(31, 41, 51, 0.72);
            }

            #app {
                margin-top: 24px;
            }
        </style>
    </head>

    <body>
        <main class="shell">
            <section class="hero">
                <h1>MotusArtium</h1>
                <p class="subtitle">Atlas semantique interactif de l'evolution de l'art</p>
                <div id="__ml_root"></div>
            </section>
        </main>
        <script src="bundle.js"></script>
    </body>

</html>
